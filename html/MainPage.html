<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Configuración básica -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Ovo&display=swap" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">

    <!-- Título -->
    <title>Noctis</title>

    <!-- Favicon -->
    <link rel="icon" href="../img/favicon-32x32.png?v=2">

    <!-- Estilos -->
    <link rel="stylesheet" href="../css/MainPage.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">

        <div class="header__container">

            <!-- LOGO -->
            <div class="header__logo">
                <a href="./MainPage.html" class="header__brand-link">
                    <h1 class="header__brand">Noctis</h1>
                </a>
            </div>

            <!-- SEARCH (BLOQUE INDEPENDIENTE) -->
            <div class="header__search">
                <div class="search">
                    <i class="search__icon ri-search-line"></i>
                    <input type="text" class="search__input" placeholder="Buscar productos...">
                    <i class="search__icon search__icon--mic ri-mic-line"></i>
                </div>
            </div>

            <!-- MENU TOGGLE -->
            <button class="header__toggle" id="menuToggle" aria-label="Abrir menú">
                <i class="header__toggle-icon ri-menu-line"></i>
            </button>

            <!-- ACCIONES -->
            <div class="header__actions">

                <!-- USER (BLOQUE) -->
                <div class="user">

                    <button class="user__button" id="userBtn" aria-label="Abrir menú de usuario">
                        <i class="user__icon ri-user-3-line"></i>
                    </button>

                    <!-- USER MENU -->
                    <div class="user-menu" id="userMenu">

                        <div class="user-menu__header">
                            <p id="userGreetingDesktop">
                                Hola, <br><strong>Invitado</strong>
                            </p>
                        </div>

                        <ul class="user-menu__list">

                            <li class="user-menu__item">
                                <a href="#" class="user-menu__link">
                                    <i class="ri-user-settings-line"></i> Mi Perfil
                                </a>
                            </li>

                            <li class="user-menu__item">
                                <a href="#" class="user-menu__link">
                                    <i class="ri-history-line"></i> Mis Pedidos
                                </a>
                            </li>

                            <li class="user-menu__divider"></li>

                            <li class="user-menu__item" id="itemLoginDesktop">
                                <a href="#" class="user-menu__link">
                                    <i class="ri-login-circle-line"></i> Iniciar Sesión
                                </a>
                            </li>

                            <li class="user-menu__item" id="itemLogoutDesktop">
                                <a href="#" class="user-menu__link user-menu__link--logout">
                                    <i class="ri-logout-box-r-line"></i> Cerrar Sesión
                                </a>
                            </li>

                        </ul>
                    </div>
                </div>

                <!-- CART (BLOQUE REAL) -->
                <div class="cart">

                    <button class="cart__button" aria-label="Abrir carrito">
                        <i class="cart__icon ri-shopping-cart-2-line"></i>
                        <span class="cart__badge">0</span>
                    </button>

                </div>

            </div>
        </div>

        <!-- MOBILE MENU (BLOQUE INDEPENDIENTE) -->
        <nav class="mobile-menu" id="mobileMenu">

            <p class="mobile-menu__greeting" id="userGreetingMobile">
                Hola, <strong>Invitado</strong>
            </p>

            <a href="#" class="mobile-menu__link">
                <i class="ri-user-settings-line"></i> Mi Perfil
            </a>

            <a href="#" class="mobile-menu__link">
                <i class="ri-history-line"></i> Mis Pedidos
            </a>

            <a href="#" class="mobile-menu__link">
                <i class="ri-shopping-cart-2-line"></i> Mi Carrito
            </a>

            <div class="mobile-menu__divider"></div>

            <a href="#" id="itemLoginMobile" class="mobile-menu__link">
                <i class="ri-login-circle-line"></i> Iniciar Sesión
            </a>

            <a href="#" id="itemLogoutMobile" class="mobile-menu__link mobile-menu__link--logout">
                <i class="ri-logout-box-r-line"></i> Cerrar Sesión
            </a>

        </nav>

    </header>

    <!-- JS -->
    <script type="module" src="../js/MainPage.js"></script>

</body>
</html>
